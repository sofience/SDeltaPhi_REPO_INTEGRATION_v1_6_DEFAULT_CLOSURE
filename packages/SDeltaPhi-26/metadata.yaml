description: "AI-readable structured package for SΔϕ-26. This module defines irreversibility not as metaphysical finality or absolute impossibility of reversal, but as restoration cost exceeding the threshold of practical return. Restoration cost is formalized as C_restore(t) = f(E, T, I, N, M), where E is energetic/material cost, T is temporal cost, I is informational reconstruction cost, N is network propagation cost, and M is memory/interpretive residue cost. The package defines formal versus practical reversibility, event fixation, eventhood as detected difference plus irreversible fixation, digital and virtual irreversibility, and diagnostic regimes for low-cost reversibility, rising restoration cost, event fixation, formal-only reversibility, digital pseudo-reversibility, and cost-exploded irreversibility."
