description: "AI-readable structured package for SΔϕ-27. This module explains how repeated low-cost operation generates path fixation and later restoration cost explosion. It separates operational cost from restoration cost: operational cost is the expense of continuing along an already selected path, while restoration cost is the expense of abandoning, revising, or reopening that path once fixation has formed. The package defines exception compression, low-cost convergence, repeated cheap continuation, path fixation, successful routine risk, authority hardening, and editability monitoring. Its core chain is E(P)↓ -> C_op(P)↓ -> repeated selection↑ -> F(P)↑ -> C_rest(P)↑."
