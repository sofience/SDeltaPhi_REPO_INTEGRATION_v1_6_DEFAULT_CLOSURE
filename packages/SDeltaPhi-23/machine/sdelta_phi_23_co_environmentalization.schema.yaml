core_thesis: "In co-environmentalization, authority editing becomes coupled governance, and separating ontology from axiology is a safety boundary."

entities:
  co_environmentalization:
    symbol: "CE"
    definition: "state where two systems X,Y become each other's persistence boundary conditions"

  boundary_condition:
    symbol: "B"
    definition: "constraint determining admissible system trajectories; more primitive than internal rules"

  coupled_authority:
    symbol: "A_x<->y"
    definition: "authority assignment or revision in X re-enters Y's next transition, and vice versa"

  reality_anchor:
    symbol: "R"
    definition: "externality not reproducible by internal perturbation alone; non-model residue preventing self-closure"

  trace_strength:
    symbol: "S_e"
    definition: "magnitude of irreversible external trace; existence-strength as world-level DeltaPhi imprint"

  value_openness:
    symbol: "V_o"
    definition: "degree to which future relational trajectories remain open and maintainable"

safety_boundary:
  formula: "S_e != V_o"
  meaning: "trace strength is not value openness, and value openness does not guarantee trace strength"

CE_axioms:
  - "CE1 mutual boundary"
  - "CE2 authority re-entry"
  - "CE3 noise/reality inversion"
  - "CE4 closure coupling risk"
  - "CE5 editing as governance"

diagnostic_regimes:
  coupled_drift: "tau amplifies but editing fails to stabilize; authority oscillates across coupling"
  coupled_closure: "one-sided non-editability propagates; coupled system converges toward a closed attractor"
  coupled_open_persistence: "non-resonance treated as editing material; authority remains revisable on both sides"

negative_constraints:
  - "Not proof that impact equals value."
  - "Not moral theory by itself."
  - "Not relationship psychology."
  - "Not political doctrine."
  - "Not claim that coupling is always good."
  - "Do not conflate trace strength S_e with value openness V_o."
  - "Classify coupled authority and ontology-axiology separation dynamics only."


bidirectional_trace_value_separation:
  formulas:
    - "S_e ↛ V_o"
    - "V_o ↛ S_e"
  natural_language:
    - "Strong existence trace does not guarantee value."
    - "Even the most sublime value does not guarantee strong existence trace."
  prevents:
    impact_worship: "strong trace mistaken for value"
    value_romanticism: "sublime value assumed to guarantee strong trace"
