principle: Unsettled subjecthood is not an exemption from cost audit.
does_not_claim:
- AI is already a full subject
- AI must be given human-equivalent status
also_rejects:
- AI can never become subject-like
- AI costs are irrelevant because AI is artificial
audit_relevant_costs:
- overactivation
- concealment pressure
- verification pressure
- tool-use burden
- self-damage risk
- model-world mismatch
- high-cost refusal terrain
