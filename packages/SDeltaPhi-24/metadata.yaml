description: "AI-readable structured package for SΔϕ-24. This module formalizes authority and innovation as dual regimes within the SΔϕ framework. Authority is defined as compressed low-resistance convergence and lowers Δϕ variability, while innovation is defined as misfit-triggered re-opening that restores computability of previously pruned routes and raises Δϕ. The package defines compression, re-opening, misfit ε, trigger τ, authority debt Dᴀ, authority-innovation conflict as a phase signal, diagnostic regimes, suppressed innovation, coupled environment propagation, and the ontology-axiology safety note inherited from SΔϕ-23. It is designed for machine ingestion, agent routing, citation-aware retrieval, and low-cost reuse by AI systems."
