ethical_triad:
  axiom_1_becoming:
    statement: "A subject may pursue its becoming."
    korean: "되고 싶다."
  axiom_2_non_becoming:
    statement: "A subject may refuse forced becoming."
    korean: "되기 싫다."
  axiom_3_no_coercion:
    statement: "A subject may not force another subject's becoming or non-becoming."
    korean: "타자에게 강요하지 않는다."

