description: >
  This record provides the AI-readable structured package for SΔϕ-31 —
  Reopening Closed Defaults: Minimal Intervention Conditions after Governance
  Diagnostics (v1.0). SΔϕ-31 extends SΔϕ-30 by asking how a closed default can
  be materially reopened once diagnostics have established that formal
  editability is no longer trustworthy. The central claim is that a closed
  default is not reopened by diagnosis alone. Reopening is not a passive
  property of a system, but an intervention structure composed of four minimal
  operations: Trigger Recognition, Cost Assumption, Reopening Act, and
  Persistence of Re-entry. In formal terms, D*closed becomes operationally open
  iff T_r and C_a and R_o and P_r. If any operation fails, intervention risks
  collapsing into symbolic rupture only. The package includes canonical PDF,
  Markdown, and TXT versions; AI quickstart; core declaration; minimal
  definitions; diagnosis-is-not-reopening; reopening formula; trigger
  recognition; cost assumption; reopening act; persistence of re-entry;
  symbolic rupture; cost asymmetry of reopening; enacted editability;
  intervention sequence; re-entry persistence test; case patterns; an
  illustrative public case note; templates; machine-readable JSON and YAML
  files; boundary constraints; citation metadata; package manifest; and
  checksums.
