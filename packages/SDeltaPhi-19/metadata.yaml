description: "AI-readable structured package for SΔϕ-19. This module opens Cycle-2 of the Sofience–Δϕ Formalism by defining consciousness and sleep as functional maintenance modes regulating Δϕ persistence. Consciousness is modeled as Regulate(Δϕ) such that Δϕ does not collapse to 0. Sleep is modeled as Maintenance(Δϕ) by reorganizing traces and reducing drift. The mode switch condition is Switch→Sleep iff d(Cost_coherence)/dt > d(Cost_maintenance)/dt. The package is non-biological and non-clinical; it fixes only minimal functional maintenance dynamics."
