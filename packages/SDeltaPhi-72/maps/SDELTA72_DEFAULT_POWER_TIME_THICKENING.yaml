core_claim: "Default power is not weakened merely by age; it is often thickened by accumulated habitation."
mechanism:
  - "A default begins as a low-cost path assignment."
  - "Actors live inside it and build institutions, education, memory, status, and authority around it."
  - "Direct negation becomes high-cost because it threatens a habitation structure, not merely an idea."
  - "Useful questions open a different judgment axis instead of only attacking the old default on its own axis."
risks:
  - "defensive reaction"
  - "moral exclusion"
  - "re-entry cost explosion"
  - "orthodoxy disguised as usefulness"
